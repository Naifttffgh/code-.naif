<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محرر لغة NAIF المطور 🛠️</title>
    <style>
        body { background: #1e1e1e; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        textarea { 
            width: 90%; height: 300px; background: #252526; color: #d4d4d4; 
            padding: 15px; border-radius: 10px; font-size: 18px; border: 1px solid #444;
            font-family: monospace;
        }
        .controls { margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; }
        button { padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .send-btn { background: #007acc; color: white; }
        .assistant-btn { background: #28a745; color: white; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <h1>محرر لغة NAIF v2.0 🚀</h1>
    
    <div class="controls">
        <button class="assistant-btn" onclick="askAssistant()">🤖 مساعد نايف (كود جاهز)</button>
        <button class="send-btn" onclick="convertToHTML()">تحويل وإرسال للموقع الثاني 📤</button>
    </div>

    <textarea id="naifCode" placeholder="اكتب كود .naif هنا أو استخدم المساعد..."></textarea>

    <script>
        function askAssistant() {
            const suggestion = {
                "title": "موقع نايف الأحمر",
                "content": "أهلاً بك في لغة نايف.. الخلفية الآن حمراء!",
                "bg_color": "#800000",
                "blocks": ["B1", "B2", "naif", "B4"]
            };
            document.getElementById('naifCode').value = JSON.stringify(suggestion, null, 2);
        }

        function convertToHTML() {
            const code = document.getElementById('naifCode').value;
            if(!code) return alert("اكتب كود أولاً!");
            localStorage.setItem('pending_naif_code', code);
            window.open('reader.html', '_blank');
        }
    </script>
</body>
</html>
