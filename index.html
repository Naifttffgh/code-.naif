<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>محرر لغة NAIF</title>
    <style>
        body { background: #1e1e1e; color: white; font-family: monospace; text-align: center; }
        textarea { width: 80%; height: 200px; background: #252526; color: #d4d4d4; padding: 15px; border-radius: 10px; font-size: 18px; }
        button { background: #007acc; color: white; padding: 10px 30px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>محرر لغة NAIF v2.0</h1>
    <textarea id="naifCode" placeholder='اكتب كودك هنا، مثال:
{
  "title": "موقعي الجديد",
  "content": "تم التحويل بنجاح!"
}'></textarea>
    <br>
    <button onclick="convertToHTML()">تحويل وإرسال للموقع الثاني 🚀</button>

    <script>
        function convertToHTML() {
            const code = document.getElementById('naifCode').value;
            // حفظ الكود في "الذاكرة المشتركة" للمتصفح (LocalStorage) عشان الموقع الثاني يشوفه
            localStorage.setItem('pending_naif_code', code);
            // فتح الموقع الثاني في تاب جديد
            window.open('reader.html', '_blank');
        }
    </script>
</body>
</html>
